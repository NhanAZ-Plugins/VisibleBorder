usage: "/vb create/remove/set/info/list/clear"
ingame-only: "This command can only be used in-game."
help:
  - "/vb create <id>                - Create a border in the current world (size = default min_size, center = you)"
  - "/vb remove <id>                - Delete one border"
  - "/vb clear                      - Delete all borders in this world"
  - "/vb list                       - List all borders in this world"
  - "/vb info <id>                  - Show full settings for a border"
  - "/vb set <id> size <value>      - Set radius immediately"
  - "/vb set <id> size <target> <seconds> - Shrink/expand over time"
  - "/vb set <id> minsize <value>   - Set minimum allowed radius"
  - "/vb set <id> lifetime <seconds>- Auto-remove after duration (0 = disable)"
  - "/vb set <id> center            - Center at your position"
  - "/vb set <id> center <x> <z>    - Center by coordinates"
  - "/vb set <id> solid <true/false>- Toggle collision blocking"
  - "/vb set <id> speed <blocks/s>  - Default shrink speed when no duration given"
  - "/vb set <id> damage amount|distance|delay <value>"
  - "/vb set <id> knockback power|distance|delay <value>"
  - "/vb set <id> onzero <kill|freeze|damage <amount>>"
  - "/vb rule <id> pvp <true/false> or grace <seconds>"
  - "/vb rule <id> hunger <true/false> | hunger freeze <0-20>"
  - "/vb rule <id> block place|break|all <true/false> | block whitelist|blacklist <blockId>"
  - "/vb rule <id> gamemode <survival|creative|adventure|spectator> | gamemode restore <true/false>"
  - "/vb rule <id> effect add <effectId> <amp> <seconds> | effect clear"
  - "/vb rule <id> list | reset"
  - "/vb preset <id> <skywars|lobby|pvparena|safe>"
border-created: "Border {id} created in this world."
border-removed: "Border {id} removed."
border-cleared: "All borders in this world have been removed."
border-empty: "No borders exist in this world."
border-list-header: "Borders ({count}):"
border-list-line: "- {id}: size {size} at ({x}, {z})"
border-not-found: "Border {id} does not exist in this world."
border-info: "Border {id}: size {size}, min {min}, center ({x},{z}), solid {solid}, damage {dmg}@{ddist}/{ddelay}s, kb {kbp}@{kbdist}/{kbdelay}s, onZero {onzero}"
border-size-set: "Border {id} size set to {size}."
border-size-anim: "Border {id} is moving to {size} over {seconds}s."
border-minsize-set: "Border {id} minimum size set to {size}."
border-lifetime-set: "Border {id} lifetime set to {seconds}s."
border-center-set: "Border {id} center moved to ({x}, {z})."
border-solid-set: "Border {id} solid = {value}."
border-speed-set: "Border {id} speed updated to {value} (blocks/s)."
border-damage-set: "Border {id} damage settings updated."
border-knockback-set: "Border {id} knockback settings updated."
border-onzero-set: "Border {id} onZero action set to {action}."
rule-updated: "Rules updated for border {id}."
rule-list-header: "Rules for {id}:"
rule-list-line: "- {key}: {value}"
rule-reset: "Rules reset for border {id}."
preset-applied: "Preset {preset} applied to border {id}."
pvp-disabled: "PvP is disabled in this zone."
block-place-deny: "You cannot place blocks here."
