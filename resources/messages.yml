usage: "/vb create/remove/set/info/list/clear"
ingame-only: "This command can only be used in-game."
help:
  - "§b/vb create <id> §7- create a border"
  - "§b/vb remove <id> §7- delete one border"
  - "§b/vb clear §7- delete all borders in this world"
  - "§b/vb list §7- list all borders in this world"
  - "§b/vb info <id> §7- show border settings"
  - "§b/vb set <id> size <value> §7- set radius"
  - "§b/vb set <id> center §7- center at your position"
  - "§b/vb set <id> center <x> <z> §7- center by coordinates"
  - "§b/vb set <id> solid <true/false> §7- when true: crossing the border kills you"
border-created: "Border {id} created in this world."
border-removed: "Border {id} removed."
border-cleared: "All borders in this world have been removed."
border-empty: "No borders exist in this world."
border-list-header: "Borders ({count}):"
border-list-line: "- {id}: size {size} at ({x}, {z})"
border-not-found: "Border {id} does not exist in this world."
border-info: "Border {id}: size {size}, center ({x},{z}), solid {solid}"
border-size-set: "Border {id} size set to {size}."
border-center-set: "Border {id} center moved to ({x}, {z})."
border-solid-set: "Border {id} solid = {value}."
